name: Build Web App

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}

      - name: Zip web build for download
        run: |
          zip -r "web-build-${{ github.run_number }}.zip" dist/

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.run_number }}
          path: web-build-${{ github.run_number }}.zip
          retention-days: 30
