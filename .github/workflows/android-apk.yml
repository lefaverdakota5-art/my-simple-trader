name: Build Android APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install JS deps
        run: npm install

      - name: Build web + copy into Android
        run: npm run apk:prepare
      
      - name: Ensure Capacitor Android is synced (generates cordova.variables.gradle)
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: android
        run: BUILD_NUMBER=${{ github.run_number }} VERSION_NAME="1.2.${{ github.run_number }}" ./gradlew assembleDebug

      - name: Rename APK for unique downloads
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "app-debug-${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-${{ github.run_number }}
          path: app-debug-${{ github.run_number }}.apk

