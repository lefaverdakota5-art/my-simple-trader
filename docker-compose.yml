version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-trader-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - ai-trader-data:/data
      - ai-trader-logs:/var/log/ai-trader
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-trader-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy for frontend
  # nginx:
  #   image: nginx:alpine
  #   container_name: ai-trader-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./dist:/var/www/ai-trader/dist:ro
  #     - ./ssl:/etc/letsencrypt:ro
  #   depends_on:
  #     - api
  #   networks:
  #     - ai-trader-network

volumes:
  ai-trader-data:
    driver: local
  ai-trader-logs:
    driver: local

networks:
  ai-trader-network:
    driver: bridge
